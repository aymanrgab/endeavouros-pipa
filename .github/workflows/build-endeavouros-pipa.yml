name: Build EndeavourOS for Pipa

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'pipa-endeavouros-builder/**'
      - '.github/workflows/build-endeavouros-pipa.yml'

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
    - uses: actions/checkout@v4

    - name: Build the Builder container
      run: docker build pipa-endeavouros-builder -t 'pipa-endeavouros-builder'

    - name: Build the Plasma image
      run: docker run --privileged -v "$(pwd)"/images:/build/images -v "/dev:/dev" pipa-endeavouros-builder plasma

    - name: Build the Gnome image
      run: docker run --privileged -v "$(pwd)"/images:/build/images -v "/dev:/dev" pipa-endeavouros-builder gnome

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag_name: endeavouros-${{ steps.date.outputs.date }}
        name: EndeavourOS for Xiaomi Pad 6 (Pipa) ${{ steps.date.outputs.date }}
        files: images/*.zip
        draft: true
